{% extends 'base/layout.html' %}
{% load static tour_tags %}
{% block title %}Virtual Tour — {{ tour.parent }}{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'netbox_virtual_tour/vendor/bootstrap.min.css' %}">
<link rel="stylesheet" href="{% static 'netbox_virtual_tour/vendor/psv-bundle.css' %}">
<style>
  body { background: #000; }
  main.container { max-width: none !important; padding: 0 !important; }
  #viewer {
    position: fixed;
    top: 56px; left: 0; right: 0; bottom: 0;
    background: #000;
  }
  .viewer-toolbar {
    position: fixed; top: 70px; right: 14px; z-index: 100;
    display: flex; gap: 8px;
  }
  .viewer-toolbar .btn { backdrop-filter: blur(4px); }
</style>
{% endblock %}

{% block content %}
<div id="viewer"></div>
<div class="viewer-toolbar">
  {% if can_edit %}
    <a class="btn btn-light btn-sm" href="{% tour_url 'tour_edit' pk=tour.pk %}">Edit</a>
  {% endif %}
  <a class="btn btn-light btn-sm" href="{% if tour.parent %}{{ tour.parent.get_absolute_url }}{% else %}/{% endif %}">Close</a>
</div>
{% endblock %}

{% block extra_body %}
<script src="{% static 'netbox_virtual_tour/vendor/psv-bundle.js' %}"></script>
<script>
const { Viewer, MarkersPlugin, VirtualTourPlugin, MapPlugin } = PhotoSphereViewer;

const DATA_URL = '{{ data_url }}';

async function init() {
  const resp = await fetch(DATA_URL);
  if (!resp.ok) {
    document.getElementById('viewer').innerHTML =
      '<div style="color:#fff;padding:2rem;">Tour not available.</div>';
    return;
  }
  const data = await resp.json();
  if (!data.scenes || data.scenes.length === 0) {
    document.getElementById('viewer').innerHTML =
      '<div style="color:#fff;padding:2rem;">This tour has no scenes yet.</div>';
    return;
  }

  const sceneById = {};
  data.scenes.forEach(s => { sceneById[String(s.id)] = s; });

  const nodes = data.scenes.map(scene => ({
    id: String(scene.id),
    panorama: scene.photo_url,
    name: scene.name,
    links: scene.links.map(l => ({
      nodeId: String(l.to_scene_id),
      position: { yaw: l.yaw, pitch: l.pitch },
      name: l.label || undefined,
    })),
  }));

  const firstScene = data.scenes[0];
  const hasFloorplan = !!data.floorplan_url;

  // floorplan_rotation is stored in degrees = the yaw the editor was facing
  // when they clicked "Set Compass Direction" (i.e. "this direction is floorplan up").
  // Map plugin computes cone angle as (yaw + rotation). For the cone to point
  // "up" when the viewer is facing that same direction D:
  //   D + rotation = 0  →  rotation = -D
  // So we negate.
  function rotationRad(scene) {
    return -((scene.floorplan_rotation || 0) * Math.PI / 180);
  }

  const plugins = [
    MarkersPlugin,
    [VirtualTourPlugin, {
      renderMode: 'markers',
      nodes,
      startNodeId: String(firstScene.id),
      // transition:false = instant texture swap with no camera animation.
      // We do our own smooth animate() in node-changed below, which gives
      // a clean snap to the saved default view without any spin or jarring
      // geometry pre-rotation.
      transitionOptions: {
        showLoader: true,
        fadeIn: false,
        rotation: false,
      },
    }],
  ];

  if (hasFloorplan) {
    plugins.push([MapPlugin, {
      imageUrl: data.floorplan_url,
      center: {
        x: firstScene.floorplan_x * data.floorplan_width,
        y: firstScene.floorplan_y * data.floorplan_height,
      },
      rotation: rotationRad(firstScene),
      defaultZoom: 50,
      size: '220px',
      position: 'bottom left',
      coneColor: 'rgba(0, 120, 255, 0.35)',
      coneSize: 40,
      spotStyle: {
        size: 18,
        color: 'rgba(0, 90, 255, 0.9)',
        hoverColor: 'rgba(0, 90, 255, 1)',
        hoverSize: 22,
      },
    }]);
  }

  const viewer = new Viewer({
    container: 'viewer',
    defaultYaw: firstScene.default_yaw,
    defaultPitch: firstScene.default_pitch,
    navbar: ['zoom', 'move', 'caption', 'fullscreen'],
    plugins,
  });

  const tourPlugin = viewer.getPlugin(VirtualTourPlugin);
  const map = hasFloorplan ? viewer.getPlugin(MapPlugin) : null;

  tourPlugin.addEventListener('node-changed', ({ node }) => {
    const scene = sceneById[node.id];
    if (!scene) return;

    // Smoothly animate to the saved default view. Speed '8rpm' is fast
    // enough to feel immediate but smooth enough not to jar.
    viewer.animate({
      yaw: scene.default_yaw,
      pitch: scene.default_pitch,
      speed: '8rpm',
    });

    if (map) {
      map.setImage(
        data.floorplan_url,
        {
          x: scene.floorplan_x * data.floorplan_width,
          y: scene.floorplan_y * data.floorplan_height,
        },
        rotationRad(scene),
      );
    }
  });

  if (map) {
    map.setHotspots(data.scenes.map(scene => ({
      id: 'scene_' + scene.id,
      x: scene.floorplan_x * data.floorplan_width,
      y: scene.floorplan_y * data.floorplan_height,
      tooltip: scene.name,
    })));
    map.addEventListener('select-hotspot', ({ hotspotId }) => {
      tourPlugin.setCurrentNode(hotspotId.replace('scene_', ''));
    });
  }
}

init().catch(err => {
  console.error(err);
  document.getElementById('viewer').innerHTML =
    '<div style="color:#fff;padding:2rem;">Error: ' + err.message + '</div>';
});
</script>
{% endblock %}

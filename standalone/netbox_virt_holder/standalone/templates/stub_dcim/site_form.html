{% extends 'base.html' %}
{% block title %}Add Site{% endblock %}

{% block content %}
<h1 class="h3 mb-3">Add Site</h1>
<form method="post" class="card card-body" style="max-width: 500px;">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label">Name</label>
    <input type="text" name="name" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Slug</label>
    <input type="text" name="slug" class="form-control" required pattern="[a-z0-9-]+">
    <div class="form-text">Lowercase letters, digits, hyphens.</div>
  </div>
  <div class="mb-3">
    <label class="form-label">Description</label>
    <input type="text" name="description" class="form-control">
  </div>
  <div>
    <button type="submit" class="btn btn-primary">Create</button>
    <a href="{% url 'stub_dcim:site_list' %}" class="btn btn-link">Cancel</a>
  </div>
</form>
{% endblock %}
